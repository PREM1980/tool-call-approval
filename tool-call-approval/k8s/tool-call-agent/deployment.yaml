apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-call-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-call-agent
  template:
    metadata:
      labels:
        app: tool-call-agent
    spec:
      hostAliases:
        - ip: "192.168.65.254"
          hostnames:
            - "host.docker.internal"
      containers:
        - name: tool-call-agent
          image: tool-call-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tool-call-agent-config
            - secretRef:
                name: tool-call-agent-secret
          volumeMounts:
            - name: gcp-credentials
              mountPath: /etc/gcp
              readOnly: true
      volumes:
        - name: gcp-credentials
          secret:
            secretName: gcp-credentials
