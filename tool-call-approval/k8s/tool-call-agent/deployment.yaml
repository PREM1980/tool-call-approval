apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-call-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-call-agent
  template:
    metadata:
      labels:
        app: tool-call-agent
    spec:
      containers:
        - name: tool-call-agent
          image: tool-call-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tool-call-agent-config
            - secretRef:
                name: tool-call-agent-secret
