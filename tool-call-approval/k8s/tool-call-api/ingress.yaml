apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tool-call-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: tool-call.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tool-call-api
                port:
                  number: 8080
