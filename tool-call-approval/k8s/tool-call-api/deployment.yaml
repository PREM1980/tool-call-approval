apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-call-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-call-api
  template:
    metadata:
      labels:
        app: tool-call-api
    spec:
      containers:
        - name: tool-call-api
          image: tool-call-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tool-call-api-config
