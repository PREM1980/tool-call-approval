<h2 class="h5 fw-semibold mb-4">Skills</h2>

<div class="d-flex align-items-center gap-3 mb-4">
  <label class="d-inline-block">
    <input type="file" (change)="onFile($event)" [disabled]="uploading" hidden />
    <span class="btn btn-outline-primary btn-sm">{{ uploading ? 'Uploading…' : '+ Upload Skill File' }}</span>
  </label>
  @if (error) { <span class="text-danger skills-status">{{ error }}</span> }
</div>

@if (skills.length === 0) {
  <p class="text-secondary skills-status">No skills uploaded yet.</p>
} @else {
  <table class="table table-hover skills-table">
    <thead class="table-light">
      <tr>
        <th class="text-uppercase text-secondary fw-semibold skills-th">Filename</th>
        <th class="text-uppercase text-secondary fw-semibold skills-th">Uploaded</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (skill of skills; track skill.id) {
        <tr>
          <td>{{ skill.filename }}</td>
          <td class="text-secondary">{{ skill.uploaded_at | date:'medium' }}</td>
          <td class="text-end">
            <button type="button" class="btn btn-outline-danger btn-sm skills-btn-delete" (click)="delete(skill.id)">Delete</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}
