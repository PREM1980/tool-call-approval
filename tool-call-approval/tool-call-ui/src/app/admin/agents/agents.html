<h2>Agents</h2>

@if (kubeconfigError) {
  <div class="banner">{{ kubeconfigError }}</div>
}

<div class="tabs">
  <button type="button" class="tab" [class.active]="tab === 'deployments'" (click)="tab = 'deployments'">
    Deployments
  </button>
  <button type="button" class="tab" [class.active]="tab === 'view'" (click)="tab = 'view'">
    View
  </button>
  <button type="button" class="tab" [class.active]="tab === 'configure'" (click)="tab = 'configure'">
    Configure
  </button>
</div>

@if (tab === 'deployments') {
  <app-deploy-form (deployed)="onDeployed()" />
}
@if (tab === 'view') {
  <app-agent-list />
}
@if (tab === 'configure') {
  <app-agent-configure />
}
