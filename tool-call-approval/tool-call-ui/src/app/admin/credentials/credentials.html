<h2>Credentials</h2>

<div class="form">
  <div class="field">
    <label>AWS Access Key ID</label>
    <input type="text" [(ngModel)]="form.aws_access_key_id" placeholder="AKIA..." />
  </div>

  <div class="field">
    <label>AWS Secret Access Key</label>
    <input type="password" [(ngModel)]="form.aws_secret_access_key" placeholder="Enter secret key" />
  </div>

  <div class="field">
    <label>AWS Region</label>
    <input type="text" [(ngModel)]="form.aws_region" placeholder="us-east-1" />
  </div>

  <div class="field">
    <label>Kubeconfig</label>
    <input type="file" accept=".yaml,.yml,.txt" (change)="onKubeconfigFile($event)" />
    <textarea
      [(ngModel)]="form.kubeconfig"
      placeholder="Paste kubeconfig YAML here or upload a file above"
      rows="10"
    ></textarea>
  </div>

  <div class="actions">
    <button (click)="save()" [disabled]="saving">{{ saving ? 'Saving…' : 'Save' }}</button>
    @if (saved) { <span class="success">Saved!</span> }
    @if (error) { <span class="error">{{ error }}</span> }
  </div>
</div>
