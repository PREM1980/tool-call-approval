<h2 class="h5 fw-semibold mb-4">Credentials</h2>

<div class="d-flex flex-column gap-3 admin-form">
  <div>
    <label class="form-label text-uppercase text-secondary fw-semibold admin-label">AWS Access Key ID</label>
    <input type="text" class="form-control" [(ngModel)]="form.aws_access_key_id" placeholder="AKIA..." />
  </div>

  <div>
    <label class="form-label text-uppercase text-secondary fw-semibold admin-label">AWS Secret Access Key</label>
    <input type="password" class="form-control" [(ngModel)]="form.aws_secret_access_key" placeholder="Enter secret key" />
  </div>

  <div>
    <label class="form-label text-uppercase text-secondary fw-semibold admin-label">AWS Region</label>
    <input type="text" class="form-control" [(ngModel)]="form.aws_region" placeholder="us-east-1" />
  </div>

  <div>
    <label class="form-label text-uppercase text-secondary fw-semibold admin-label">Kubeconfig</label>
    <input type="file" class="form-control form-control-sm mb-2" accept=".yaml,.yml,.txt" (change)="onKubeconfigFile($event)" />
    <textarea
      class="form-control font-monospace kubeconfig-area"
      [(ngModel)]="form.kubeconfig"
      placeholder="Paste kubeconfig YAML here or upload a file above"
      rows="10"
    ></textarea>
  </div>

  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-primary" (click)="save()" [disabled]="saving">{{ saving ? 'Saving…' : 'Save' }}</button>
    @if (saved) { <span class="text-success fw-medium admin-status">Saved!</span> }
    @if (error) { <span class="text-danger admin-status">{{ error }}</span> }
  </div>
</div>
