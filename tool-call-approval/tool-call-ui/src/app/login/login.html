<div class="login-page">
  <section class="login-hero">
    <div>
      <span class="login-eyebrow">Devops Agent</span>
      <h1>Secure access for every chat workspace.</h1>
      <p>Sign in to continue.</p>
    </div>
  </section>

  <section class="login-panel" aria-label="Login form">
    <h2>Sign in</h2>
    <p class="login-subtitle">Enter your username and password.</p>

    @if (error) {
      <div class="alert alert-danger py-2">{{ error }}</div>
    }

    <form (ngSubmit)="submit()" class="login-form">
      <label class="form-label" for="username">Username</label>
      <input
        class="form-control form-control-lg"
        id="username"
        name="username"
        [(ngModel)]="username"
        autocomplete="username"
        required
      />

      <label class="form-label" for="password">Password</label>
      <input
        class="form-control form-control-lg"
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />

      <button class="btn btn-primary btn-lg w-100 login-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>
  </section>
</div>
