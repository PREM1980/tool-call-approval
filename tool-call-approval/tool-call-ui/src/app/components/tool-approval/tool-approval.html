<div class="approval-card">
  <div class="approval-body">
    <span class="approval-icon">⚙️</span>
    <code class="approval-command">{{ formattedCommand }}</code>
    <button type="button" class="approval-btn deny" [disabled]="disabled" (click)="reject()">✕ Deny</button>
    <button type="button" class="approval-btn allow" [disabled]="disabled" (click)="approve()">✓ Allow</button>
  </div>
</div>
