<div class="card border-warning shadow-sm rounded-3 my-2">
  <div class="d-flex align-items-center px-3 py-2 gap-3">
    <span class="approval-icon">⚙️</span>
    <code class="flex-grow-1 font-monospace text-primary approval-command">{{ formattedCommand }}</code>
    <button type="button" class="btn btn-outline-danger btn-sm" [disabled]="disabled" (click)="reject()">✕ Deny</button>
    <button type="button" class="btn btn-outline-success btn-sm" [disabled]="disabled" (click)="approve()">✓ Allow</button>
  </div>
</div>
